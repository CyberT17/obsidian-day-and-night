name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Build plugin
        run: |
          npm install
          npm run build
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "main.js"
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: "styles.css"
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          assets=("main.js" "manifest.json")
          if [ -s "styles.css" ]; then
            assets+=("styles.css")
          fi

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            "${assets[@]}"